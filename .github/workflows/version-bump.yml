name: Version Bump

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    # Skip commits made by the bot (formula updates, version bumps) to prevent loops
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if VERSION was already bumped in this push
        id: check
        run: |
          if git diff HEAD~1 -- VERSION | grep -q '^[+-][0-9]'; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Increment patch version
        if: steps.check.outputs.bumped == 'false'
        run: |
          VERSION="$(cat VERSION | tr -d '[:space:]')"
          IFS='.' read -r major minor patch <<< "$VERSION"
          patch=$((patch + 1))
          echo "$major.$minor.$patch" > VERSION
          echo "Bumped $VERSION → $major.$minor.$patch"

      - name: Commit and push
        if: steps.check.outputs.bumped == 'false'
        run: |
          VERSION="$(cat VERSION | tr -d '[:space:]')"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to $VERSION"
          git push origin HEAD:main
