name: Release

on:
  push:
    branches: [main]
    paths: [VERSION]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION="$(cat VERSION | tr -d '[:space:]')"
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ steps.version.outputs.tag }}" --generate-notes

      - name: Compute SHA256 of source tarball
        if: steps.check.outputs.exists == 'false'
        id: sha
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          # Retry a few times — the tarball may take a moment to become available after tagging
          for i in 1 2 3 4 5; do
            HTTP_CODE="$(curl -sL -o /tmp/release.tar.gz -w '%{http_code}' "$URL")"
            if [ "$HTTP_CODE" = "200" ]; then
              break
            fi
            sleep 5
          done
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error: Failed to download tarball (HTTP $HTTP_CODE)" >&2
            exit 1
          fi
          SHA256="$(sha256sum /tmp/release.tar.gz | awk '{print $1}')"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        if: steps.check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"
          REPO="${{ github.repository }}"

          python3 - "$TAG" "$SHA256" "$REPO" <<'PYEOF'
          import sys, re

          tag, sha256, repo = sys.argv[1], sys.argv[2], sys.argv[3]

          with open("Formula/gmux.rb") as f:
              content = f.read()

          # Update url line
          content = re.sub(
              r'url ".*"',
              f'url "https://github.com/{repo}/archive/refs/tags/{tag}.tar.gz"',
              content,
          )

          # Update or insert sha256 line
          if re.search(r'^\s*sha256\s+"', content, re.MULTILINE):
              content = re.sub(
                  r'(^\s*)sha256\s+".*"',
                  rf'\1sha256 "{sha256}"',
                  content,
                  flags=re.MULTILINE,
              )
          else:
              content = re.sub(
                  r'(url ".*")',
                  rf'\1\n  sha256 "{sha256}"',
                  content,
              )

          with open("Formula/gmux.rb", "w") as f:
              f.write(content)
          PYEOF

      - name: Commit and push formula update
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gmux.rb
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No formula changes to commit"
          else
            git commit -m "chore: update formula for ${{ steps.version.outputs.tag }}"
            git push origin HEAD:main
          fi
